<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>SportDune Admin</title>

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/main.css">

  <style>
    :root {
      --bg-primary: #0f1419;
      --bg-secondary: #1a1a1a;
      --bg-tertiary: #2d2d2d;
      --text-primary: #e7e9ea;
      --text-secondary: #8899a6;
      --accent: #1d9bf0;
      --accent-hover: #1a8cd8;
      --success: #00ba7c;
      --error: #f4212e;
      --warning: #ffd400;
      --border: #38444d;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.5;
    }

    .app-loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg-primary);
      z-index: 9999;
      transition: opacity 0.3s ease;
    }

    .app-loader.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader-spinner {
      width: 48px;
      height: 48px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .loader-text {
      margin-top: 16px;
      color: var(--text-secondary);
      font-size: 14px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg-primary);
      padding: 40px;
      text-align: center;
    }

    .error-icon {
      font-size: 64px;
      margin-bottom: 16px;
    }

    .error-title {
      font-size: 24px;
      font-weight: 600;
      color: var(--error);
      margin-bottom: 8px;
    }

    .error-message {
      color: var(--text-secondary);
      max-width: 500px;
      margin-bottom: 24px;
    }

    .error-btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .error-btn:hover {
      background: var(--accent-hover);
    }

    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: linear-gradient(135deg, var(--bg-primary) 0%, #15202b 100%);
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--bg-secondary);
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    .login-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .login-logo-icon {
      width: 48px;
      height: 48px;
      background: var(--accent);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .login-logo-text {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), #00d4ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .login-title {
      text-align: center;
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .login-subtitle {
      text-align: center;
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 14px;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(29,155,240,0.15);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
    }

    .btn-primary {
      width: 100%;
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .login-error {
      background: rgba(244,33,46,0.1);
      border: 1px solid var(--error);
      color: var(--error);
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
    }

    .login-error.show {
      display: block;
    }

    .dashboard-layout {
      display: none;
      min-height: 100vh;
    }

    .dashboard-layout.active {
      display: flex;
    }

    .sidebar {
      width: 260px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      z-index: 100;
    }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 700;
    }

    .sidebar-logo-icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sidebar-nav {
      flex: 1;
      padding: 16px 12px;
      overflow-y: auto;
    }

    .nav-section {
      margin-bottom: 24px;
    }

    .nav-section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
      padding: 0 12px;
      margin-bottom: 8px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: 8px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .nav-item:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }

    .nav-item.active {
      background: rgba(29,155,240,0.1);
      color: var(--accent);
    }

    .nav-item-icon {
      font-size: 18px;
      width: 24px;
      text-align: center;
    }

    .sidebar-footer {
      padding: 16px;
      border-top: 1px solid var(--border);
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: var(--bg-tertiary);
      border-radius: 8px;
    }

    .user-avatar {
      width: 40px;
      height: 40px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 14px;
    }

    .user-details {
      flex: 1;
      min-width: 0;
    }

    .user-name {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .user-role {
      font-size: 12px;
      color: var(--text-secondary);
      text-transform: capitalize;
    }

    .main-content {
      flex: 1;
      margin-left: 260px;
      min-height: 100vh;
    }

    .top-bar {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .top-bar-title {
      font-size: 20px;
      font-weight: 600;
    }

    .top-bar-actions {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .content-area {
      padding: 32px;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .page-title {
      font-size: 28px;
      font-weight: 700;
    }

    .page-subtitle {
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .stat-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .stat-icon.primary { background: rgba(29,155,240,0.15); }
    .stat-icon.success { background: rgba(0,186,124,0.15); }
    .stat-icon.warning { background: rgba(255,212,0,0.15); }
    .stat-icon.error { background: rgba(244,33,46,0.15); }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
    }

    .stat-label {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .data-table-container {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
    }

    .data-table th {
      text-align: left;
      padding: 16px 20px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
      background: var(--bg-tertiary);
      border-bottom: 1px solid var(--border);
    }

    .data-table td {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .data-table tr:last-child td {
      border-bottom: none;
    }

    .data-table tr:hover td {
      background: var(--bg-tertiary);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .badge-success {
      background: rgba(0,186,124,0.15);
      color: var(--success);
    }

    .badge-warning {
      background: rgba(255,212,0,0.15);
      color: var(--warning);
    }

    .badge-error {
      background: rgba(244,33,46,0.15);
      color: var(--error);
    }

    .badge-default {
      background: var(--bg-tertiary);
      color: var(--text-secondary);
    }

    .toast-container {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 10000;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .toast {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
      animation: slideIn 0.3s ease;
      min-width: 300px;
    }

    .toast-success { border-left: 4px solid var(--success); }
    .toast-error { border-left: 4px solid var(--error); }
    .toast-warning { border-left: 4px solid var(--warning); }

    .toast-icon {
      font-size: 20px;
    }

    .toast-message {
      flex: 1;
      font-size: 14px;
    }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .hidden { display: none !important; }
    .text-center { text-align: center; }
    .text-muted { color: var(--text-secondary); }
  </style>
</head>
<body>
  <div id="app">
    <div class="app-loader" id="loader">
      <div class="loader-spinner"></div>
      <div class="loader-text">Loading SportDune Admin...</div>
    </div>
  </div>

  <script>
    const CONFIG = {
      SUPABASE_URL: 'https://pvmtcwqupalurwqlvdxy.supabase.co',
      SUPABASE_ANON_KEY: 'sb_publishable_fuqgloaY9Hi7mHi0HsH8DQ_fjvXS_E6',
      TOKEN_KEY: 'sportdune_token',
      USER_KEY: 'sportdune_user'
    };

    const AppError = {
      show(title, message, showRetry = true) {
        document.getElementById('app').innerHTML = `
          <div class="error-screen">
            <div class="error-icon">⚠️</div>
            <h1 class="error-title">${title}</h1>
            <p class="error-message">${message}</p>
            ${showRetry ? '<button class="error-btn" onclick="location.reload()">Retry</button>' : ''}
          </div>
        `;
      },

      init() {
        window.addEventListener('error', (e) => {
          console.error('Error:', e.error);
          this.show('Something went wrong', e.error?.message || 'An unexpected error occurred');
        });

        window.addEventListener('unhandledrejection', (e) => {
          console.error('Unhandled rejection:', e.reason);
          this.show('Unexpected error', e.reason?.message || 'An unexpected error occurred');
        });
      }
    };

    const Utils = {
      $: (sel) => document.querySelector(sel),
      $$: (sel) => document.querySelectorAll(sel),

      generateId() {
        return Math.random().toString(36).substr(2, 9);
      },

      formatDate(date) {
        if (!date) return '-';
        return new Date(date).toLocaleDateString('en-US', {
          month: 'short', day: 'numeric', year: 'numeric'
        });
      },

      slugify(text) {
        return text.toString().toLowerCase().trim()
          .replace(/\s+/g, '-')
          .replace(/[^\w\-]+/g, '')
          .replace(/\-\-+/g, '-');
      },

      escapeHtml(text) {
        const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
        return text.replace(/[&<>"']/g, m => map[m]);
      },

      getInitials(name) {
        if (!name) return '?';
        return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
      },

      safeJson(str, fallback = null) {
        try { return str ? JSON.parse(str) : fallback; }
        catch { return fallback; }
      }
    };

    const API = {
      baseUrl: CONFIG.SUPABASE_URL,

      headers: {
        'Content-Type': 'application/json',
        'apikey': CONFIG.SUPABASE_ANON_KEY
      },

      getToken() {
        return localStorage.getItem(CONFIG.TOKEN_KEY);
      },

      getHeaders() {
        const h = { ...this.headers };
        const token = this.getToken();
        if (token) h['Authorization'] = `Bearer ${token}`;
        return h;
      },

      async request(endpoint, options = {}) {
        const url = `${this.baseUrl}/rest/v1/${endpoint}`;
        const config = {
          ...options,
          headers: { ...this.getHeaders(), ...options.headers }
        };

        const response = await fetch(url, config);
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || data.error || 'Request failed');
        }

        return data;
      },

      get(endpoint) {
        return this.request(endpoint, { method: 'GET' });
      },

      post(endpoint, body) {
        return this.request(endpoint, { method: 'POST', body: JSON.stringify(body) });
      },

      patch(endpoint, body) {
        return this.request(endpoint, { method: 'PATCH', body: JSON.stringify(body) });
      },

      delete(endpoint) {
        return this.request(endpoint, { method: 'DELETE' });
      }
    };

    const Auth = {
      getToken() {
        return localStorage.getItem(CONFIG.TOKEN_KEY);
      },

      getUser() {
        const data = localStorage.getItem(CONFIG.USER_KEY);
        return data ? Utils.safeJson(data) : null;
      },

      setUser(user) {
        localStorage.setItem(CONFIG.USER_KEY, JSON.stringify(user));
      },

      clearUser() {
        localStorage.removeItem(CONFIG.TOKEN_KEY);
        localStorage.removeItem(CONFIG.USER_KEY);
      },

      isAuthenticated() {
        return !!this.getToken() && !!this.getUser();
      },

      async login(email, password) {
        const response = await fetch(`${CONFIG.SUPABASE_URL}/auth/v1/token?grant_type=password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'apikey': CONFIG.SUPABASE_ANON_KEY },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error_description || data.msg || 'Login failed');
        }

        localStorage.setItem(CONFIG.TOKEN_KEY, data.access_token);

        const profile = await API.get(`profiles?id=eq.${data.user.id}&select=*`);
        if (profile && profile.length > 0) {
          const user = { ...data.user, ...profile[0] };
          this.setUser(user);
          return user;
        }
        throw new Error('Profile not found');
      },

      logout() {
        this.clearUser();
        App.navigate('/');
      },

      requireAuth() {
        if (!this.isAuthenticated()) {
          App.navigate('/');
          return false;
        }
        return true;
      }
    };

    const Toast = {
      container: null,

      init() {
        if (!this.container) {
          this.container = document.createElement('div');
          this.container.className = 'toast-container';
          document.body.appendChild(this.container);
        }
      },

      show(message, type = 'info') {
        this.init();
        const icons = { success: '✓', error: '✕', warning: '⚠', info: 'ℹ' };
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        toast.innerHTML = `
          <span class="toast-icon">${icons[type] || 'ℹ'}</span>
          <span class="toast-message">${message}</span>
        `;
        this.container.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
      },

      success(msg) { this.show(msg, 'success'); },
      error(msg) { this.show(msg, 'error'); },
      warning(msg) { this.show(msg, 'warning'); }
    };

    const Router = {
      routes: {},

      register(path, handler) {
        this.routes[path] = handler;
      },

      navigate(path) {
        history.pushState(null, '', path);
        this.handleRoute();
      },

      handleRoute() {
        const path = window.location.pathname;
        let handler = this.routes[path];

        if (!handler) {
          for (const route in this.routes) {
            const pattern = route.replace(/:(\w+)/g, '([^/]+)');
            const regex = new RegExp(`^${pattern}$`);
            if (regex.test(path)) {
              const params = path.match(regex).slice(1);
              handler = () => this.routes[route](...params);
              break;
            }
          }
        }

        if (handler) {
          handler();
        } else if (Auth.isAuthenticated()) {
          this.navigate('/dashboard');
        } else {
          this.navigate('/');
        }
      },

      init() {
        window.addEventListener('popstate', () => this.handleRoute());
        this.handleRoute();
      }
    };

    const Pages = {
      login() {
        if (Auth.isAuthenticated()) {
          Router.navigate('/dashboard');
          return;
        }

        document.getElementById('app').innerHTML = `
          <div class="login-container">
            <div class="login-card">
              <div class="login-logo">
                <div class="login-logo-icon">⚽</div>
                <div class="login-logo-text">SportDune</div>
              </div>
              <h1 class="login-title">Admin Login</h1>
              <p class="login-subtitle">Sign in to manage your sports content</p>

              <div class="login-error" id="login-error"></div>

              <form id="login-form">
                <div class="form-group">
                  <label class="form-label">Email</label>
                  <input type="email" class="form-input" id="login-email" placeholder="admin@sportdune.com" required>
                </div>
                <div class="form-group">
                  <label class="form-label">Password</label>
                  <input type="password" class="form-input" id="login-password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn btn-primary" id="login-btn">Sign In</button>
              </form>
            </div>
          </div>
        `;

        Utils.$('#login-form').addEventListener('submit', async (e) => {
          e.preventDefault();
          const email = Utils.$('#login-email').value;
          const password = Utils.$('#login-password').value;
          const btn = Utils.$('#login-btn');
          const errorEl = Utils.$('#login-error');

          btn.disabled = true;
          btn.textContent = 'Signing in...';
          errorEl.classList.remove('show');

          try {
            await Auth.login(email, password);
            Toast.success('Welcome back!');
            Router.navigate('/dashboard');
          } catch (error) {
            errorEl.textContent = error.message || 'Login failed. Please check your credentials.';
            errorEl.classList.add('show');
          } finally {
            btn.disabled = false;
            btn.textContent = 'Sign In';
          }
        });
      },

      dashboard() {
        if (!Auth.requireAuth()) return;
        const user = Auth.getUser();

        document.getElementById('app').innerHTML = this.layout('Dashboard', `
          <div class="page-header">
            <div>
              <h1 class="page-title">Dashboard</h1>
              <p class="page-subtitle">Welcome back, ${user.full_name || user.email}!</p>
            </div>
            <button class="btn btn-primary" onclick="Toast.success('Article editor coming soon!')">
              <span>+</span> New Article
            </button>
          </div>

          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-icon primary">📰</div>
              <div>
                <div class="stat-value" id="stat-articles">-</div>
                <div class="stat-label">Total Articles</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon success">⚽</div>
              <div>
                <div class="stat-value" id="stat-sports">11</div>
                <div class="stat-label">Sports</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon warning">🏆</div>
              <div>
                <div class="stat-value" id="stat-leagues">-</div>
                <div class="stat-label">Leagues</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon error">👁️</div>
              <div>
                <div class="stat-value" id="stat-views">-</div>
                <div class="stat-label">Total Views</div>
              </div>
            </div>
          </div>

          <div class="data-table-container">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Recent Articles</th>
                  <th>Sport</th>
                  <th>Status</th>
                  <th>Date</th>
                </tr>
              </thead>
              <tbody id="recent-articles">
                <tr><td colspan="4" class="text-center text-muted">Loading...</td></tr>
              </tbody>
            </table>
          </div>
        `);

        this.loadDashboardStats();
      },

      articles() {
        if (!Auth.requireAuth()) return;

        document.getElementById('app').innerHTML = this.layout('Articles', `
          <div class="page-header">
            <div>
              <h1 class="page-title">Articles</h1>
              <p class="page-subtitle">Manage your content</p>
            </div>
            <button class="btn btn-primary" onclick="Toast.success('Article editor coming soon!')">
              <span>+</span> New Article
            </button>
          </div>

          <div class="data-table-container">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Title</th>
                  <th>Sport</th>
                  <th>Status</th>
                  <th>Views</th>
                  <th>Date</th>
                </tr>
              </thead>
              <tbody id="articles-list">
                <tr><td colspan="5" class="text-center text-muted">Loading...</td></tr>
              </tbody>
            </table>
          </div>
        `);

        this.loadArticles();
      },

      sports() {
        if (!Auth.requireAuth()) return;

        document.getElementById('app').innerHTML = this.layout('Sports', `
          <div class="page-header">
            <div>
              <h1 class="page-title">Sports</h1>
              <p class="page-subtitle">Manage sports categories</p>
            </div>
          </div>

          <div class="data-table-container">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Icon</th>
                  <th>Name</th>
                  <th>Slug</th>
                  <th>Status</th>
                  <th>Order</th>
                </tr>
              </thead>
              <tbody id="sports-list">
                <tr><td colspan="5" class="text-center text-muted">Loading...</td></tr>
              </tbody>
            </table>
          </div>
        `);

        this.loadSports();
      },

      users() {
        if (!Auth.requireAuth()) return;

        document.getElementById('app').innerHTML = this.layout('Users', `
          <div class="page-header">
            <div>
              <h1 class="page-title">Users</h1>
              <p class="page-subtitle">Manage admin users</p>
            </div>
          </div>

          <div class="data-table-container">
            <table class="data-table">
              <thead>
                <tr>
                  <th>User</th>
                  <th>Role</th>
                  <th>Status</th>
                  <th>Last Login</th>
                </tr>
              </thead>
              <tbody id="users-list">
                <tr><td colspan="4" class="text-center text-muted">Loading...</td></tr>
              </tbody>
            </table>
          </div>
        `);

        this.loadUsers();
      },

      settings() {
        if (!Auth.requireAuth()) return;

        document.getElementById('app').innerHTML = this.layout('Settings', `
          <div class="page-header">
            <div>
              <h1 class="page-title">Settings</h1>
              <p class="page-subtitle">Configure your site</p>
            </div>
          </div>

          <div class="data-table-container" style="padding: 24px;">
            <p class="text-muted">Settings panel coming soon...</p>
          </div>
        `);
      },

      layout(title, content) {
        const user = Auth.getUser() || {};
        return `
          <div class="dashboard-layout active">
            <aside class="sidebar">
              <div class="sidebar-header">
                <div class="sidebar-logo">
                  <div class="sidebar-logo-icon">⚽</div>
                  <span>SportDune</span>
                </div>
              </div>

              <nav class="sidebar-nav">
                <div class="nav-section">
                  <div class="nav-section-title">Main</div>
                  <a class="nav-item ${title === 'Dashboard' ? 'active' : ''}" data-page="dashboard">
                    <span class="nav-item-icon">📊</span>
                    <span>Dashboard</span>
                  </a>
                  <a class="nav-item ${title === 'Articles' ? 'active' : ''}" data-page="articles">
                    <span class="nav-item-icon">📰</span>
                    <span>Articles</span>
                  </a>
                  <a class="nav-item ${title === 'Sports' ? 'active' : ''}" data-page="sports">
                    <span class="nav-item-icon">⚽</span>
                    <span>Sports</span>
                  </a>
                </div>

                <div class="nav-section">
                  <div class="nav-section-title">Management</div>
                  <a class="nav-item ${title === 'Users' ? 'active' : ''}" data-page="users">
                    <span class="nav-item-icon">👥</span>
                    <span>Users</span>
                  </a>
                  <a class="nav-item ${title === 'Settings' ? 'active' : ''}" data-page="settings">
                    <span class="nav-item-icon">⚙️</span>
                    <span>Settings</span>
                  </a>
                </div>
              </nav>

              <div class="sidebar-footer">
                <div class="user-info">
                  <div class="user-avatar">${Utils.getInitials(user.full_name || user.email)}</div>
                  <div class="user-details">
                    <div class="user-name">${user.full_name || user.email}</div>
                    <div class="user-role">${(user.role || 'admin').replace('_', ' ')}</div>
                  </div>
                  <button class="btn" onclick="Auth.logout()" title="Logout" style="padding: 8px;">🚪</button>
                </div>
              </div>
            </aside>

            <main class="main-content">
              <header class="top-bar">
                <h2 class="top-bar-title">${title}</h2>
                <div class="top-bar-actions">
                  <span style="color: var(--text-secondary); font-size: 14px;">${new Date().toLocaleDateString()}</span>
                </div>
              </header>
              <div class="content-area">
                ${content}
              </div>
            </main>
          </div>
        `;
      },

      async loadDashboardStats() {
        try {
          const articles = await API.get('articles?select=id,view_count&order=created_at.desc&limit=5');
          const leagues = await API.get('leagues?select=id');

          Utils.$('#stat-articles').textContent = articles.length;
          Utils.$('#stat-leagues').textContent = leagues.length;
          Utils.$('#stat-views').textContent = articles.reduce((sum, a) => sum + (a.view_count || 0), 0).toLocaleString();

          if (articles.length > 0) {
            Utils.$('#recent-articles').innerHTML = articles.map(a => `
              <tr>
                <td>${Utils.escapeHtml(a.title || 'Untitled')}</td>
                <td>-</td>
                <td><span class="badge badge-${a.status === 'published' ? 'success' : 'default'}">${a.status || 'draft'}</span></td>
                <td>${Utils.formatDate(a.created_at)}</td>
              </tr>
            `).join('');
          } else {
            Utils.$('#recent-articles').innerHTML = '<tr><td colspan="4" class="text-center text-muted">No articles yet</td></tr>';
          }
        } catch (e) {
          console.error('Failed to load stats:', e);
        }
      },

      async loadArticles() {
        try {
          const articles = await API.get('articles?select=*&order=created_at.desc&limit=20');
          if (articles.length > 0) {
            Utils.$('#articles-list').innerHTML = articles.map(a => `
              <tr>
                <td>${Utils.escapeHtml(a.title || 'Untitled')}</td>
                <td>-</td>
                <td><span class="badge badge-${a.status === 'published' ? 'success' : 'default'}">${a.status || 'draft'}</span></td>
                <td>${(a.view_count || 0).toLocaleString()}</td>
                <td>${Utils.formatDate(a.created_at)}</td>
              </tr>
            `).join('');
          } else {
            Utils.$('#articles-list').innerHTML = '<tr><td colspan="5" class="text-center text-muted">No articles yet</td></tr>';
          }
        } catch (e) {
          Utils.$('#articles-list').innerHTML = '<tr><td colspan="5" class="text-center text-muted">Failed to load</td></tr>';
        }
      },

      async loadSports() {
        try {
          const sports = await API.get('sports?select=*&order=nav_order');
          Utils.$('#sports-list').innerHTML = sports.map(s => `
            <tr>
              <td>${s.icon || '⚽'}</td>
              <td>${Utils.escapeHtml(s.name)}</td>
              <td>${s.slug}</td>
              <td><span class="badge badge-${s.is_active ? 'success' : 'default'}">${s.is_active ? 'Active' : 'Inactive'}</span></td>
              <td>${s.nav_order}</td>
            </tr>
          `).join('');
        } catch (e) {
          Utils.$('#sports-list').innerHTML = '<tr><td colspan="5" class="text-center text-muted">Failed to load</td></tr>';
        }
      },

      async loadUsers() {
        try {
          const users = await API.get('profiles?select=*&order=created_at.desc');
          Utils.$('#users-list').innerHTML = users.map(u => `
            <tr>
              <td>
                <div style="display:flex;align-items:center;gap:12px;">
                  <div class="user-avatar">${Utils.getInitials(u.full_name || u.email)}</div>
                  <div>${Utils.escapeHtml(u.email)}</div>
                </div>
              </td>
              <td><span class="badge badge-${u.role === 'super_admin' ? 'success' : 'default'}">${u.role || 'viewer'}</span></td>
              <td><span class="badge badge-${u.is_active ? 'success' : 'error'}">${u.is_active ? 'Active' : 'Inactive'}</span></td>
              <td>${Utils.formatDate(u.last_login_at)}</td>
            </tr>
          `).join('');
        } catch (e) {
          Utils.$('#users-list').innerHTML = '<tr><td colspan="4" class="text-center text-muted">Failed to load</td></tr>';
        }
      }
    };

    const App = {
      init() {
        AppError.init();

        Router.register('/', () => Pages.login());
        Router.register('/dashboard', () => Pages.dashboard());
        Router.register('/articles', () => Pages.articles());
        Router.register('/sports', () => Pages.sports());
        Router.register('/users', () => Pages.users());
        Router.register('/settings', () => Pages.settings());

        document.addEventListener('click', (e) => {
          const navItem = e.target.closest('.nav-item[data-page]');
          if (navItem) {
            e.preventDefault();
            const page = navItem.dataset.page;
            Router.navigate(`/${page}`);
          }
        });

        Router.init();

        const loader = document.getElementById('loader');
        if (loader) loader.classList.add('hidden');
      },

      navigate(path) {
        Router.navigate(path);
      }
    };

    document.addEventListener('DOMContentLoaded', () => App.init());
  </script>
</body>
</html>
