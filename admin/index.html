<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportDune Admin</title>
    <link rel="stylesheet" href="css/admin.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="app">
        <div id="loading-screen" class="loading-screen">
            <div class="loading-spinner"></div>
            <p class="loading-text">Loading SportDune Admin...</p>
        </div>
        <div id="error-screen" class="error-screen" style="display:none;">
            <div class="error-content">
                <h2>⚠️ Something went wrong</h2>
                <p id="error-message"></p>
                <p id="error-details"></p>
                <button onclick="location.reload()" class="btn btn-primary">Reload Page</button>
            </div>
        </div>
        <div id="auth-container" style="display:none;"></div>
        <div id="dashboard-container" style="display:none;">
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <div class="sidebar-logo">
                        <span class="logo-icon">🏆</span>
                        <span class="logo-text">SportDune</span>
                    </div>
                    <button class="sidebar-close" id="sidebar-close" aria-label="Close sidebar">×</button>
                </div>
                <nav class="sidebar-nav" id="sidebar-nav">
                    <a href="#dashboard" class="nav-item" data-page="dashboard">
                        <span class="nav-icon">📊</span>
                        <span class="nav-label">Dashboard</span>
                    </a>
                    <a href="#articles" class="nav-item" data-page="articles">
                        <span class="nav-icon">📝</span>
                        <span class="nav-label">Articles</span>
                    </a>
                    <a href="#sports" class="nav-item" data-page="sports">
                        <span class="nav-icon">⚽</span>
                        <span class="nav-label">Sports</span>
                    </a>
                    <a href="#leagues" class="nav-item" data-page="leagues">
                        <span class="nav-icon">🏆</span>
                        <span class="nav-label">Leagues</span>
                    </a>
                    <a href="#trending" class="nav-item" data-page="trending">
                        <span class="nav-icon">🔥</span>
                        <span class="nav-label">Trending</span>
                    </a>
                    <a href="#homepage" class="nav-item" data-page="homepage">
                        <span class="nav-icon">🏠</span>
                        <span class="nav-label">Homepage</span>
                    </a>
                    <a href="#media" class="nav-item" data-page="media">
                        <span class="nav-icon">🖼️</span>
                        <span class="nav-label">Media</span>
                    </a>
                    <a href="#users" class="nav-item admin-only" data-page="users">
                        <span class="nav-icon">👥</span>
                        <span class="nav-label">Users</span>
                    </a>
                    <a href="#settings" class="nav-item admin-only" data-page="settings">
                        <span class="nav-icon">⚙️</span>
                        <span class="nav-label">Settings</span>
                    </a>
                    <a href="#audit" class="nav-item admin-only" data-page="audit">
                        <span class="nav-icon">📋</span>
                        <span class="nav-label">Audit Logs</span>
                    </a>
                </nav>
                <div class="sidebar-footer">
                    <div class="user-info">
                        <div class="user-avatar" id="user-avatar">A</div>
                        <div class="user-details">
                            <span class="user-name" id="user-name">Admin</span>
                            <span class="user-role" id="user-role">Super Admin</span>
                        </div>
                    </div>
                    <button class="logout-btn" id="logout-btn">
                        <span>🚪</span>
                        <span>Logout</span>
                    </button>
                </div>
            </aside>
            <div class="main-wrapper">
                <header class="topbar">
                    <button class="menu-toggle" id="menu-toggle" aria-label="Toggle menu">☰</button>
                    <h1 class="page-title" id="page-title">Dashboard</h1>
                    <div class="topbar-actions">
                        <a href="https://sportdune.vercel.app" target="_blank" class="topbar-link" title="View Site">🌐 View Site</a>
                    </div>
                </header>
                <main class="content" id="content"></main>
            </div>
        </div>
        <div id="toast-container"></div>
        <div id="modal-overlay" class="modal-overlay" style="display:none;">
            <div class="modal" id="modal">
                <div class="modal-header">
                    <h3 id="modal-title"></h3>
                    <button class="modal-close" id="modal-close">×</button>
                </div>
                <div class="modal-body" id="modal-body"></div>
                <div class="modal-footer" id="modal-footer"></div>
            </div>
        </div>
    </div>

        window.SPORTDUNE_ADMIN_CONFIG = {

    <script src="js/utils.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/router.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/articles.js"></script>
    <script src="js/article-editor.js"></script>
    <script src="js/sports.js"></script>
    <script src="js/leagues.js"></script>
    <script src="js/trending.js"></script>
    <script src="js/homepage.js"></script>
    <script src="js/media.js"></script>
    <script src="js/users.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/audit.js"></script>
</body>
</html>
