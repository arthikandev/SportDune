<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SportDune Admin - Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Poppins', sans-serif; background: #F7F8FC; }
    .header { background: #1E1E2F; color: white; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 24px; }
    .header h1 span { color: #FF4C29; }
    .logout { background: #FF4C29; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-family: inherit; font-weight: 600; }
    .content { padding: 40px; }
    .card { background: white; border-radius: 12px; padding: 30px; box-shadow: 0 2px 14px rgba(0,0,0,0.1); margin-bottom: 20px; }
    .card h2 { color: #1E1E2F; margin-bottom: 20px; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
    .stat { background: white; border-radius: 12px; padding: 24px; text-align: center; box-shadow: 0 2px 14px rgba(0,0,0,0.1); }
    .stat-value { font-size: 36px; font-weight: 800; color: #FF4C29; }
    .stat-label { color: #6B7280; font-size: 14px; margin-top: 8px; }
    .success { background: #D1FAE5; color: #065F46; padding: 16px; border-radius: 8px; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Sport<span>Dune</span> Admin</h1>
    <button class="logout" onclick="logout()">Logout</button>
  </div>
  
  <div class="content">
    <div class="success" id="welcome">Welcome to SportDune Admin Dashboard!</div>
    
    <div class="stats">
      <div class="stat">
        <div class="stat-value" id="articles">0</div>
        <div class="stat-label">Articles</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="categories">0</div>
        <div class="stat-label">Categories</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="users">1</div>
        <div class="stat-label">Users</div>
      </div>
      <div class="stat">
        <div class="stat-value">0</div>
        <div class="stat-label">Page Views</div>
      </div>
    </div>
    
    <div class="card">
      <h2>Quick Actions</h2>
      <p>Welcome to the SportDune Admin Dashboard. This is a simplified version while we fix the full admin panel.</p>
    </div>
  </div>

  <script>
    // Check if logged in
    const token = localStorage.getItem('sportdune_token');
    const userStr = localStorage.getItem('sportdune_user');
    
    if (!token) {
      window.location.href = 'login.html';
    } else {
      const user = JSON.parse(userStr || '{}');
      document.getElementById('welcome').innerHTML = 'Welcome, ' + (user.email || 'Admin') + '!';
    }
    
    function logout() {
      localStorage.removeItem('sportdune_token');
      localStorage.removeItem('sportdune_user');
      window.location.href = 'login.html';
    }
  </script>
</body>
</html>
